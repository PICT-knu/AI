name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST_RAW: ${{ secrets.EC2_HOST }}
          EC2_USER_RAW: ${{ secrets.EC2_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          EC2_HOST=$(echo "$EC2_HOST_RAW" | tr -d '[:space:]')
          EC2_USER=$(echo "$EC2_USER_RAW" | tr -d '[:space:]')
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -l "$EC2_USER" "$EC2_HOST" << 'EOF'
            set -e
            cd ~/AI
            git pull origin main
            which docker-compose && sudo docker-compose up -d --build || echo "docker-compose not found"
            docker --version || echo "docker not found"
          EOF
